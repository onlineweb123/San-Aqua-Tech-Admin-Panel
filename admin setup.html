<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAN Aqua Tech | Admin Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #0077b6;
            --primary-dark: #005f94;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .setup-container {
            width: 100%; max-width: 400px; background: var(--card-bg); padding: 40px;
            border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 1px solid var(--border); margin: 20px;
        }
        .logo-area { text-align: center; margin-bottom: 20px; font-size: 50px; }
        h1 { font-size: 22px; font-weight: 800; margin: 10px 0 5px; text-align: center; }
        p { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        input {
            width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
            border-radius: 12px; font-family: inherit; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.08); }
        input:disabled { background: #f1f5f9; color: var(--text-muted); cursor: not-allowed; }
        .btn-action {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 10px;
        }
        .btn-action:hover { background: var(--primary-dark); }
        .badge {
            display: block; text-align: center; padding: 8px; border-radius: 8px;
            font-size: 12px; font-weight: 700; margin-bottom: 15px; display: none;
        }
        .badge.exists { background: #fee2e2; color: #ef4444; display: block; }
        .badge.new { background: #dcfce7; color: var(--success); display: block; }
    </style>
</head>
<body>

<div class="setup-container">
    <div class="logo-area">⚙️</div>
    <h1 id="setupTitle">Admin Account Setup</h1>
    <p id="setupDesc">Create or update the single master admin profile</p>

    <div id="statusBadge" class="badge"></div>

    <div class="form-group">
        <label>Admin Username</label>
        <input type="text" id="usernameField" placeholder="e.g., santhanam">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="passwordField" placeholder="••••••••">
    </div>

    <button id="actionBtn" class="btn-action" onclick="saveAdminData()">Save Profile</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqyyGJt_t0ztknMudFVLmo6relkEa284g",
        authDomain: "meadi-aqua-tech.firebaseapp.com",
        databaseURL: "https://san-aqua-tech-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "meadi-aqua-tech",
        storageBucket: "meadi-aqua-tech.firebasestorage.app",
        messagingSenderId: "531151217708",
        appId: "1:531151217708:web:b30b6e1a0bf7fa60f29d89"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let isExistingUser = false;

    // பக்கத்தை திறந்தவுடன் ஏற்கனவே அட்மின் இருக்கிறாரா என பார்க்கிறது
    window.addEventListener('load', async () => {
        try {
            const snapshot = await get(ref(db, 'admin_account'));
            const badge = document.getElementById("statusBadge");
            const userInput = document.getElementById("usernameField");

            if (snapshot.exists()) {
                const currentData = snapshot.val();
                isExistingUser = true;
                userInput.value = currentData.username;
                userInput.disabled = true; // யூசர்நேம் மாற்ற முடியாதபடி லாக் செய்யப்படுகிறது
                
                badge.innerText = "🔒 Admin Registered (Username Locked)";
                badge.className = "badge exists";
                document.getElementById("setupTitle").innerText = "Update Admin Password";
                document.getElementById("setupDesc").innerText = "You can modify your password below";
            } else {
                isExistingUser = false;
                badge.innerText = "✨ No Admin Found (Create One Now)";
                badge.className = "badge new";
            }
        } catch(e) { console.error(e); }
    });

    window.saveAdminData = async () => {
        const username = document.getElementById("usernameField").value.trim();
        const password = document.getElementById("passwordField").value.trim();

        if(!username || !password) {
            alert("Please fill all fields!");
            return;
        }

        try {
            if (isExistingUser) {
                // பாஸ்வேர்ட் மட்டும் எடிட்/அப்டேட் செய்தல்
                await update(ref(db, 'admin_account'), { password: password });
                alert("🎉 Password updated successfully!");
            } else {
                // முதல் முறை அட்மின் கணக்கை உருவாக்குதல்
                await set(ref(db, 'admin_account'), {
                    username: username,
                    password: password
                });
                alert("🎉 Admin account created successfully!");
            }
            window.location.replace("admin login.html");
        } catch (error) {
            alert("Error saving data: " + error.message);
        }
    };
</script>
</body>
</html>
