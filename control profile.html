<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAN Aqua Tech | Admin Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0077b6; 
            --secondary: #00b4d8;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc; 
            --card: #ffffff; 
            --border: #e2e8f0; 
            --text-dark: #0f172a;
            --text-light: #64748b;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-dark); 
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .admin-container { max-width: 900px; margin: 40px auto; padding-bottom: 60px; }
        .admin-header { text-align: center; margin-bottom: 35px; }
        .admin-header h1 { margin: 0; color: var(--primary); font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
        .admin-header p { color: var(--text-light); margin-top: 6px; font-weight: 500; }

        .card { 
            background: var(--card); 
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0, 119, 182, 0.04); 
            margin-bottom: 25px; 
        }

        .input-group { display: flex; gap: 12px; margin-top: 10px; }

        input, select, textarea { 
            width: 100%;
            padding: 14px 18px; 
            border: 1.5px solid var(--border); 
            border-radius: 14px; 
            outline: none; 
            font-family: inherit;
            font-size: 15px;
            background: #f8fafc;
            color: var(--text-dark);
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.08);
        }

        textarea { resize: vertical; min-height: 90px; }

        .btn { 
            padding: 14px 28px; border: none; border-radius: 14px; cursor: pointer; 
            font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;
            position: relative; overflow: hidden; min-width: 130px; font-family: inherit; font-size: 15px;
        }

        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .btn-text { display: none; }
        .loading .spinner { display: block; }
        .loading { pointer-events: none; opacity: 0.8; }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(0, 119, 182, 0.2); }
        .btn-primary:hover { background: #005f92; }
        .btn-success { background: var(--success); color: white; width: 100%; margin: 30px 0; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); font-size: 16px; padding: 16px; }
        .btn-success:hover { background: #0ca673; }
        .btn-danger { background: #fee2e2; color: var(--danger); padding: 8px 14px; font-size: 13px; border-radius: 10px; font-weight: 600; }
        .btn-danger:hover { background: var(--danger); color: white; }

        .user-found { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .section-title {
            display: flex; align-items: center; gap: 10px; margin: 35px 0 18px;
            padding-bottom: 12px; border-bottom: 2px dashed #e2e8f0;
            color: var(--primary); font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .full-row { grid-column: 1 / -1; }

        .field-box label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 8px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }

        .history-list { width: 100%; border-collapse: collapse; margin-top: 10px; background: #ffffff; }
        .history-list th { text-align: left; font-size: 11px; color: var(--text-light); padding: 12px; border-bottom: 2px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
        .history-list td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        .user-badge { background: #e0f2fe; color: var(--primary); padding: 12px 24px; border-radius: 14px; display: inline-block; font-weight: 700; margin-bottom: 25px; font-size: 15px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h1>🛠 SAN Aqua Tech Dashboard</h1>
        <p>Manage customer purifier details and service logs</p>
        <a href="customer detail.html" style="text-decoration:none; color:var(--primary); font-weight:700; display: inline-flex; align-items: center; gap: 6px;">← Back to Customer Explorer</a>
    </div>

    <div class="card">
        <div class="search-area">
            <label style="font-weight: 700; font-size: 12px; color: var(--text-light); display: block; text-transform: uppercase; letter-spacing: 0.5px;">Search by Username or Phone</label>
            <div class="input-group">
                <input type="text" id="searchUsername" placeholder="Enter Username or Phone Number...">
                <button class="btn btn-primary" id="searchBtn">
                    <span class="btn-text">🔍 Search</span>
                    <div class="spinner"></div>
                </button>
            </div>
        </div>

        <div id="userResult" class="user-found">
            <div class="section-title">👤 Customer Found</div>
            <div class="user-badge" id="displayName">User: Name</div>

            <div class="section-title">💧 Purifier Configuration</div>
            <div class="form-grid">
                <div class="field-box">
                    <label>Machine Model</label>
                    <input type="text" id="editModel" placeholder="e.g. RO + UV + TDS Controller">
                </div>
                <div class="field-box">
                    <label>Installation Date</label>
                    <input type="text" id="editInstalled" placeholder="e.g. 12 April 2025">
                </div>
                <div class="field-box">
                    <label>Warranty Status</label>
                    <select id="editWarranty">
                        <option value="Active">✅ Active</option>
                        <option value="Expired">❌ Expired</option>
                    </select>
                </div>
                <div class="field-box full-row">
                    <label>Installation Address / Location</label>
                    <textarea id="editAddress" placeholder="Enter full installation address..."></textarea>
                </div>
            </div>

            <div class="section-title">📅 Maintenance Tracking</div>
            <div class="form-grid">
                <div class="field-box">
                    <label>Last Filter Change (Start Date)</label>
                    <input type="date" id="lastFilterDate">
                </div>
                <div class="field-box">
                    <label>Last AMC Service (Start Date)</label>
                    <input type="date" id="lastAMCDate">
                </div>
            </div>

            <div class="section-title">🛠 Log New Service Record</div>
            <div class="form-grid">
                <div class="field-box">
                    <label>Service Type Description</label>
                    <input type="text" id="newServiceType" placeholder="e.g. Sediment Filter Replacement">
                </div>
                <div class="field-box">
                    <label>Service Action Date</label>
                    <input type="date" id="newServiceDate">
                </div>
            </div>

            <button class="btn btn-success" id="saveBtn">
                <span class="btn-text">💾 Save & Update Profile</span>
                <div class="spinner"></div>
            </button>

            <div class="section-title">📜 Comprehensive Service History</div>
            <div style="overflow-x: auto; background: #fff; border-radius: 16px; border: 1px solid var(--border);">
                <table class="history-list">
                    <thead>
                        <tr>
                            <th>Service Type</th>
                            <th>Execution Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, update, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // SAN Aqua Tech Firebase configurations
    const firebaseConfig = {
        apiKey: "AIzaSyAqyyGJt_t0ztknMudFVLmo6relkEa284g",
        authDomain: "meadi-aqua-tech.firebaseapp.com",
        databaseURL: "https://san-aqua-tech-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "meadi-aqua-tech",
        storageBucket: "meadi-aqua-tech.firebasestorage.app",
        messagingSenderId: "531151217708",
        appId: "1:531151217708:web:b30b6e1a0bf7fa60f29d89"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let activeUsername = "";
    let currentHistory = [];

    function setBtnLoading(btnId, isLoading) {
        const btn = document.getElementById(btnId);
        if (isLoading) btn.classList.add('loading');
        else btn.classList.remove('loading');
    }

    async function performSearch(input) {
        if(!input) return alert("Please enter Username or Phone Number");

        setBtnLoading('searchBtn', true);
        const dbRef = ref(db);
        try {
            const allUsersSnap = await get(child(dbRef, `users`));
            if (allUsersSnap.exists()) {
                const users = allUsersSnap.val();
                let foundKey = "";

                for (let key in users) {
                    if (key.toLowerCase() === input.toLowerCase() || users[key].phone === input) {
                        foundKey = key;
                        break;
                    }
                }

                if (foundKey) {
                    activeUsername = foundKey;
                    renderUserData(users[foundKey]);
                    document.getElementById('userResult').style.display = 'block';
                } else {
                    alert("❌ No user found in SAN Aqua Tech database!");
                    document.getElementById('userResult').style.display = 'none';
                }
            }
        } catch (error) {
            alert("Error fetching SAN Aqua Tech network data");
        } finally {
            setBtnLoading('searchBtn', false);
        }
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const userFromUrl = params.get('user');
        if (userFromUrl) {
            document.getElementById('searchUsername').value = userFromUrl;
            performSearch(userFromUrl);
        }
    };

    document.getElementById('searchBtn').onclick = () => {
        const val = document.getElementById('searchUsername').value.trim();
        performSearch(val);
    };

    document.getElementById('searchUsername').onkeypress = (e) => {
        if(e.key === "Enter") performSearch(e.target.value.trim());
    };

    function renderUserData(user) {
        document.getElementById('displayName').innerText = `Customer: ${user.name} (${user.phone})`;
        document.getElementById('editModel').value = user.model || "";
        document.getElementById('editInstalled').value = user.installed || "";
        document.getElementById('editWarranty').value = user.warranty || "Active";
        document.getElementById('editAddress').value = user.address || "";
        document.getElementById('lastFilterDate').value = user.lastFilterDate || "";
        document.getElementById('lastAMCDate').value = user.lastAMCDate || "";

        currentHistory = user.history ? (Array.isArray(user.history) ? user.history : Object.values(user.history)) : [];
        renderHistory();
    }

    function renderHistory() {
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = currentHistory.length === 0 ? '<tr><td colspan="3" style="text-align:center; color: var(--text-light); padding: 20px;">No records available</td></tr>' : '';

        currentHistory.sort((a, b) => new Date(b.date) - new Date(a.date));

        currentHistory.forEach((item, index) => {
            const rawDate = item.date || '';
            let formattedDate = rawDate;

            if (rawDate) {
                const d = new Date(rawDate);
                if (!isNaN(d.getTime())) {
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear();
                    formattedDate = `${day}/${month}/${year}`;
                }
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><b style="color: var(--text-dark);">${item.type}</b></td>
                <td style="color: var(--text-light); font-weight: 500;">${formattedDate}</td>
                <td><button class="btn btn-danger">🗑 Delete</button></td>
            `;
            row.querySelector('button').onclick = () => {
                if(confirm("Are you sure you want to delete this record?")) {
                    currentHistory.splice(index, 1);
                    renderHistory();
                }
            };
            tbody.appendChild(row);
        });
    }

    document.getElementById('saveBtn').onclick = async () => {
        if(!activeUsername) return;

        const sType = document.getElementById('newServiceType').value.trim();
        const sDate = document.getElementById('newServiceDate').value.trim();

        setBtnLoading('saveBtn', true);

        if (sType && sDate) {
            currentHistory.unshift({ type: sType, date: sDate });
        }

        const updatedData = {
            model: document.getElementById('editModel').value,
            installed: document.getElementById('editInstalled').value,
            warranty: document.getElementById('editWarranty').value,
            address: document.getElementById('editAddress').value,
            lastFilterDate: document.getElementById('lastFilterDate').value,
            lastAMCDate: document.getElementById('lastAMCDate').value,
            history: currentHistory
        };

        try {
            await update(ref(db, `users/${activeUsername}`), updatedData);
            alert("✅ Profile Updated Successfully inside SAN Aqua Tech!");
            document.getElementById('newServiceType').value = "";
            document.getElementById('newServiceDate').value = "";
            renderHistory();
        } catch (error) {
            alert("Update Failed! Please check connection status.");
        } finally {
            setBtnLoading('saveBtn', false);
        }
    };
</script>
</body>
</html>
