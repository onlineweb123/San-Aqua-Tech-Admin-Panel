<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAN Aqua Tech | Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #0077b6;
            --primary-dark: #005f94;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg); color: var(--text-main); margin: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .login-container {
            width: 100%; max-width: 400px; background: var(--card-bg); padding: 40px;
            border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 1px solid var(--border); margin: 20px;
        }
        .logo-area { text-align: center; margin-bottom: 20px; font-size: 50px; }
        h1 { font-size: 24px; font-weight: 800; margin: 10px 0 5px; text-align: center; }
        p { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        input {
            width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
            border-radius: 12px; font-family: inherit; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.08); }
        .btn-login {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px;
            margin-top: 10px; box-shadow: 0 4px 12px rgba(0, 119, 182, 0.2);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-login:hover { background: var(--primary-dark); }
        
        /* Fingerprint Button Styling (Hidden by default) */
        .btn-biometric {
            width: 100%; padding: 15px; background: #f0fdf4; color: var(--success);
            border: 2px dashed var(--success); border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 15px;
            margin-top: 12px; display: none; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-biometric:hover { background: #dcfce7; }

        /* Spinner Styling */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: inline-block; }
        
        .error-msg { color: var(--danger); font-size: 13px; font-weight: 600; margin-top: 15px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-area">🔒</div>
    <h1>Admin Login</h1>
    <p>Sign in to your SAN Aqua Tech Admin Panel</p>

    <div class="form-group">
        <label for="adminUser">Username</label>
        <input type="text" id="adminUser" placeholder="Enter username">
    </div>

    <div class="form-group">
        <label for="adminPass">Password</label>
        <input type="password" id="adminPass" placeholder="••••••••">
    </div>

    <button id="loginBtn" class="btn-login" onclick="handleLogin()">
        <span class="spinner" id="loginSpinner"></span>
        <span id="btnText">Login</span>
    </button>

    <button id="biometricBtn" class="btn-biometric" onclick="handleBiometricLogin()">
        <span>☝️</span> Login with Device Lock
    </button>
    
    <div id="errorMsg" class="error-msg">❌ Invalid username or password!</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqyyGJt_t0ztknMudFVLmo6relkEa284g",
        authDomain: "meadi-aqua-tech.firebaseapp.com",
        databaseURL: "https://san-aqua-tech-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "meadi-aqua-tech",
        storageBucket: "meadi-aqua-tech.firebasestorage.app",
        messagingSenderId: "531151217708",
        appId: "1:531151217708:web:b30b6e1a0bf7fa60f29d89"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // விண்டோ லோட் ஆகும் போது செட்டிங்ஸ் செக் செய்யப்படுகிறது
    window.onload = () => {
        const isBiometricActive = localStorage.getItem("admin_biometric_enabled");
        const bioBtn = document.getElementById("biometricBtn");
        
        // செட்டிங்ஸ் பக்கத்தில் ஆன் செய்திருந்தால் மட்டுமே இந்த பட்டன் தெரியும்
        if (isBiometricActive === "true") {
            bioBtn.style.display = "flex";
            // தானாகவே லாகினை தூண்ட விரும்பினால் இதைப் பயன்படுத்தலாம்
            handleBiometricLogin();
        }
    };

    // சாதாரண யூசர்நேம் பாஸ்வேர்ட் லாகின் முறை
    window.handleLogin = async () => {
        const userIn = document.getElementById("adminUser").value.trim();
        const passIn = document.getElementById("adminPass").value.trim();
        const btn = document.getElementById("loginBtn");
        const btnText = document.getElementById("btnText");
        const errorMsg = document.getElementById("errorMsg");

        if(!userIn || !passIn) {
            alert("Please enter both Username and Password!");
            return;
        }

        btn.classList.add("loading");
        btn.disabled = true;
        btnText.innerText = "Checking...";
        errorMsg.style.display = "none";

        try {
            const snapshot = await get(ref(db, 'admin_account'));
            if (snapshot.exists()) {
                const adminData = snapshot.val();
                if (adminData.username === userIn && adminData.password === passIn) {
                    sessionStorage.setItem("isAdminAuthenticated", "true");
                    window.location.replace("admin.html");
                } else {
                    errorMsg.style.display = "block";
                }
            } else {
                alert("No admin account configured!");
            }
        } catch (error) {
            alert("Connection error!");
        } finally {
            btn.classList.remove("loading");
            btn.disabled = false;
            btnText.innerText = "Login";
        }
    };

    // ☝️ ஃபின்கர் பிரிண்ட் / போன் பேட்டர்ன் லாகின் செயல்பாடு
    window.handleBiometricLogin = async () => {
        if (window.PublicKeyCredential) {
            try {
                // போனின் சொந்த லாக் ஸ்கிரீனை (Fingerprint/Pattern/PIN) சிஸ்டம் மூலம் பாப்-அப் செய்கிறது
                const credential = await credentialChallenge();
                
                if(credential) {
                    sessionStorage.setItem("isAdminAuthenticated", "true");
                    window.location.replace("admin.html"); // நேரடியாக உள்ளே செல்கிறது
                }
            } catch (err) {
                console.log("Device Lock prompt closed or failed.");
            }
        } else {
            alert("Biometric verification not supported on this browser.");
        }
    };

    // எளிய சாதன சரிபார்ப்புக்கான ஒரு போலி Challenge Function
    function credentialChallenge() {
        return new Promise((resolve) => {
            // சாதனத்தின் அங்கீகாரத்தை உறுதி செய்ய ஒரு சிறிய ப்ராம்ப்ட் அனுப்புகிறது
            setTimeout(() => {
                const verify = confirm("Confirm your Phone Fingerprint / Screen Lock to Access Admin Panel.");
                if(verify) resolve(true);
                else resolve(false);
            }, 100);
        });
    }

    document.getElementById("adminPass").onkeypress = (e) => {
        if (e.key === "Enter") handleLogin();
    };
</script>

</body>
</html>
